<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Administrador Municipal — Llay-Llay</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🏛</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
:root{--pri:#1B4332;--pri-l:#2D6A4F;--pri-s:#40916C;--acc:#D4A373;--acc-l:#FAEDCD;--bg:#FEFAE0;--card:#FFF;--tx:#1B4332;--txl:#52796F;--ok:#40916C;--warn:#DDA15E;--err:#BC4749;--info:#3A86A8;--brd:#D4D4AA}
body.dark{--pri:#52B788;--pri-l:#74C69D;--pri-s:#95D5B2;--acc:#D4A373;--acc-l:#3D3524;--bg:#1A1F1C;--card:#252B27;--tx:#E8EDE9;--txl:#95A5A0;--ok:#52B788;--warn:#E9B872;--err:#D66A6D;--info:#6BB8D1;--brd:#3D4540}
body.dark .cd{background:var(--card);border-color:var(--brd)}
body.dark input,body.dark select,body.dark textarea{background:#2E3530;color:var(--tx);border-color:var(--brd)}
body.dark table{color:var(--tx)}
body.dark tr.ra{background:rgba(255,255,255,.03)}
body.dark .fi{background:#2E3530;color:var(--tx)}
@media print{body{background:#fff!important}.sb,.hd,#notifPanel,#gsResults,.be,.bdel,.mb{display:none!important}.mn{margin-left:0!important}.cd{break-inside:avoid;page-break-inside:avoid;box-shadow:none;border:1px solid #ddd}.print-only{display:block!important}.no-print{display:none!important}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
input[type=checkbox]{accent-color:var(--pri-s);cursor:pointer;width:17px;height:17px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#c4c4a0;border-radius:3px}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:260px;background:var(--pri);display:flex;flex-direction:column;transition:width .3s;overflow:hidden;flex-shrink:0}
.sidebar.closed{width:0}
.sb-hd{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1);min-width:260px}
.sb-hd .sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.sb-hd .ttl{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px}
.sb-hd .role{font-size:11px;color:var(--acc);margin-top:4px;font-weight:500}
.sb-nav{padding:16px 12px;flex:1;overflow-y:auto;min-width:260px}
.sb-ft{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);min-width:260px;font-size:11px;color:rgba(255,255,255,.3);line-height:1.5}
.nb{display:flex;align-items:center;gap:12px;width:100%;padding:11px 14px;border:none;border-radius:10px;margin-bottom:3px;font-size:13px;font-weight:400;background:transparent;color:rgba(255,255,255,.6);transition:all .2s;text-align:left}
.nb:hover{background:rgba(255,255,255,.08)}.nb.act{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.nb svg{flex-shrink:0}

.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.hd{display:flex;align-items:center;gap:16px;padding:14px 28px;background:var(--card);border-bottom:1px solid rgba(212,212,170,.2);flex-shrink:0}
.hd h1{margin:0;font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.hd .dt{font-size:12px;color:var(--txl);margin-top:2px}
.hr{display:flex;align-items:center;gap:12px;margin-left:auto}
.av{width:36px;height:36px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.nt{position:relative;cursor:pointer}.nd{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--err)}
.ct{flex:1;padding:28px;overflow-y:auto}
.mb{background:none;border:none;color:var(--tx);padding:4px}

/* Grid */
.g{display:grid;gap:16px}.g4{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}.g3{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}.g2{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}.gu{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.g20{gap:20px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}

/* Card */
.cd{background:var(--card);border-radius:16px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid rgba(212,212,170,.2)}
.cds{padding:20px}.cdu{cursor:default;transition:transform .25s,box-shadow .25s}.cdu:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.08)}
.cdt{background:var(--acc-l);border:1px solid rgba(212,163,115,.27);border-radius:16px;padding:20px}
.cdl{background:rgba(27,67,50,.05);border:1px solid rgba(27,67,50,.13);border-radius:16px;padding:20px}

/* Badge */
.bd{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;display:inline-block}
.bd-completado{background:#D8F3DC;color:#1B4332}.bd-en_progreso,.bd-en_proceso{background:#FFF3CD;color:#856404}.bd-pendiente{background:#FCE4EC;color:#BC4749}
.bd-adjudicada{background:#D8F3DC;color:#1B4332}.bd-ejecucion{background:#D4E6F1;color:#1A5276}.bd-diseno{background:#F3E5F5;color:#6A1B9A}.bd-licitacion{background:#FFF3CD;color:#856404}
.bd-en_licitacion{background:#D4E6F1;color:#1A5276}.bd-publica{background:#D8F3DC;color:#1B4332}.bd-privada{background:#FFE5B4;color:#8B4513}
.bd-vencido{background:#BC4749;color:#fff}.bd-respondido{background:#D8F3DC;color:#1B4332}
.alert-banner{background:linear-gradient(135deg,#BC4749,#a03032);color:#fff;border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;box-shadow:0 4px 12px rgba(188,71,73,.25)}
.alert-banner svg{flex-shrink:0}
.ofi-row{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid rgba(212,212,170,.1);flex-wrap:wrap;align-items:flex-start}
.ofi-main{flex:1;min-width:200px}.ofi-title{font-size:14px;font-weight:600}.ofi-sub{font-size:12px;color:var(--txl);margin-top:3px;line-height:1.5}
.ofi-days{text-align:center;min-width:70px;padding:6px 10px;border-radius:10px;font-weight:700}
.ofi-days.urgent{background:#FCE4EC;color:#BC4749}.ofi-days.warning{background:#FFF3CD;color:#856404}.ofi-days.ok{background:#D8F3DC;color:#1B4332}.ofi-days.overdue{background:#BC4749;color:#fff}
.ofi-obs{font-size:12px;color:var(--txl);font-style:italic;margin-top:4px;padding:4px 8px;background:rgba(212,212,170,.15);border-radius:6px}
.unit-notes{width:100%;min-height:60px;padding:8px 12px;border-radius:8px;border:1px solid var(--brd);font-size:12px;resize:vertical;outline:none;margin-top:10px;transition:border .2s;background:rgba(254,250,224,.5)}
.unit-notes:focus{border-color:var(--pri-s)}
.unit-notes-label{font-size:11px;color:var(--txl);margin-top:10px;font-weight:600}

/* Notifications panel */
.notif-counter{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;border-radius:9px;background:var(--err);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 2px 4px rgba(0,0,0,.2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.notif-panel{position:fixed;top:62px;right:20px;width:380px;max-width:calc(100vw - 40px);max-height:calc(100vh - 80px);background:var(--card);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.18);z-index:150;display:none;flex-direction:column;overflow:hidden;animation:slideDown .25s ease}
.notif-panel.open{display:flex}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.notif-header{padding:16px 20px;border-bottom:1px solid rgba(212,212,170,.2);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1B4332,#2D6A4F);color:#fff}
.notif-header h3{margin:0;font-size:15px;font-weight:700}
.notif-header .nx{background:rgba(255,255,255,.15);border:none;color:#fff;width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.notif-header .nx:hover{background:rgba(255,255,255,.25)}
.notif-body{flex:1;overflow-y:auto;padding:8px 0}
.notif-section{padding:8px 16px}
.notif-section-title{font-size:10px;font-weight:700;color:var(--txl);text-transform:uppercase;letter-spacing:.8px;padding:8px 4px 6px;display:flex;align-items:center;gap:6px}
.notif-item{display:flex;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:background .15s;align-items:flex-start;border-left:3px solid transparent}
.notif-item:hover{background:rgba(212,212,170,.15)}
.notif-item.urg{border-left-color:var(--err);background:rgba(188,71,73,.06)}
.notif-item.warn{border-left-color:var(--warn);background:rgba(221,161,94,.06)}
.notif-item.soon{border-left-color:var(--info)}
.notif-item.high{border-left-color:#9D4EDD;background:rgba(157,78,221,.05)}
.notif-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.notif-content{flex:1;min-width:0}
.notif-title{font-size:13px;font-weight:600;color:var(--tx);line-height:1.3;margin-bottom:2px}
.notif-meta{font-size:11px;color:var(--txl);line-height:1.4}
.notif-days{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;align-self:center;white-space:nowrap}
.notif-days.urg{background:var(--err);color:#fff}.notif-days.warn{background:var(--warn);color:#fff}.notif-days.soon{background:var(--info);color:#fff}.notif-days.high{background:#9D4EDD;color:#fff}
.notif-empty{padding:40px 20px;text-align:center;color:var(--txl);font-size:13px}
.notif-empty-icon{font-size:36px;margin-bottom:8px;display:block}
.ct-tag{font-size:10px;background:rgba(64,145,108,.1);color:var(--pri-s);padding:1px 8px;border-radius:10px;font-weight:600;text-transform:uppercase}
.pd{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;flex-shrink:0}
.pd-alta{background:var(--err)}.pd-media{background:var(--warn)}.pd-baja{background:var(--ok)}

/* KPI */
.kpi{display:flex;align-items:center;gap:16px}.ki{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.kv{font-size:26px;font-weight:700;line-height:1.1}.kl{font-size:12px;color:var(--txl);margin-top:2px}.kt{font-size:11px;font-weight:600;margin-top:2px}

/* Table */
.tw{overflow-x:auto}table{width:100%;border-collapse:separate;border-spacing:0 8px}
th{text-align:left;padding:8px 16px;font-size:11px;font-weight:600;color:var(--txl);text-transform:uppercase;letter-spacing:.5px}
td{padding:12px 16px;font-size:13px}tr.ra{background:#fafaf4}tr.rn{background:var(--card)}
td:first-child{border-radius:12px 0 0 12px}td:last-child{border-radius:0 12px 12px 0}

.pt{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden}.pf{height:100%;border-radius:3px;transition:width 1s}

/* Task */
.ti{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(212,212,170,.1);transition:opacity .3s}
.ti.dn{opacity:.45}.tt{font-size:14px;font-weight:500}.tt.sk{text-decoration:line-through}
.tm{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center}
.tdl{background:none;border:none;color:var(--err);font-size:15px;padding:4px 6px;opacity:.4;transition:opacity .2s}.tdl:hover{opacity:1}

.cr{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(212,212,170,.1)}
.ci{flex:1}.ctt{font-size:14px;font-weight:600}.cs{font-size:12px;color:var(--txl);margin-top:2px}

.gi{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--txl);line-height:1.5;margin-bottom:8px}
.gb{color:var(--pri-s);font-weight:700;min-width:16px}.gc{margin:0;font-size:14px;color:var(--txl);line-height:1.7}

/* Buttons */
.bp{padding:10px 20px;border-radius:10px;border:none;background:var(--pri);color:#fff;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:background .2s}.bp:hover{background:var(--pri-l)}
.bs{padding:8px 16px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--tx);font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all .2s}.bs:hover{border-color:var(--pri-s);color:var(--pri-s)}
.bl{background:none;border:none;color:var(--pri-s);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.be{background:none;border:none;color:var(--txl);padding:4px;opacity:.5;transition:opacity .2s;font-size:14px}.be:hover{opacity:1;color:var(--pri-s)}
.bdel{background:none;border:none;color:var(--err);padding:4px;opacity:.4;transition:opacity .2s;font-size:14px}.bdel:hover{opacity:1}
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}

/* Forms */
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;font-weight:600;color:var(--txl);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.fi{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--brd);font-size:13px;outline:none;transition:border .2s}.fi:focus{border-color:var(--pri-s)}
select.fi{background:var(--card)}
.fr{display:flex;gap:10px;flex-wrap:wrap}.fr .fg{flex:1;min-width:140px}

/* Modal */
.mo{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(0,0,0,.35);animation:mIn .2s ease}
.mo.open{display:flex}
.mc{background:var(--card);border-radius:20px;padding:28px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:mSl .25s ease}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.mh h2{font-size:18px;font-weight:700;margin:0}
.mx{background:none;border:none;font-size:22px;color:var(--txl);padding:4px}.mx:hover{color:var(--tx)}
.mf{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
@keyframes mIn{from{opacity:0}to{opacity:1}}
@keyframes mSl{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Section anim */
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.sc{animation:fadeIn .35s ease forwards}

.oc-id{font-weight:600;color:var(--pri-s);font-family:'Courier New',monospace}
.ck{font-size:13px;color:var(--txl);line-height:1.9}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--pri);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:300;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;box-shadow:0 4px 15px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateY(0)}

/* Responsive */
@media(max-width:768px){.sidebar{position:fixed;z-index:100;height:100vh}.sidebar.closed{width:0}.g2{grid-template-columns:1fr}.ct{padding:16px}.hd{padding:14px 16px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-hd"><div class="sub">Municipalidad de</div><div class="ttl">Llay-Llay</div><div class="role">Panel del Administrador Municipal</div></div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-ft">
      <div style="margin-bottom:8px"><button class="bs" id="gdriveBtn" onclick="gdriveConnect()" style="width:100%;justify-content:center;color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2);margin-bottom:6px;background:rgba(58,134,168,.2)">☁️ Conectar Drive</button><button class="bs" id="gdriveSyncBtn" onclick="gdriveSyncNow()" style="width:100%;justify-content:center;color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15);margin-bottom:6px;display:none">🔄 Sincronizar ahora</button><div id="gdriveStatus" style="font-size:10px;color:rgba(255,255,255,.5);text-align:center;padding:4px 0;display:none"></div></div>
      <div style="margin-bottom:8px"><button class="bs" onclick="toggleDark()" style="width:100%;justify-content:center;color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15);margin-bottom:6px" id="darkBtn">🌙 Modo oscuro</button><button class="bs" onclick="generarReporte()" style="width:100%;justify-content:center;color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15);margin-bottom:6px">🖨 Generar reporte</button><button class="bs" onclick="exportData()" style="width:100%;justify-content:center;color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15);margin-bottom:6px">📥 Exportar respaldo</button><button class="bs" onclick="document.getElementById('importFileInput').click()" style="width:100%;justify-content:center;color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15)">📤 Importar respaldo</button><input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importData(this)"></div>
      <div style="margin-bottom:8px"><button class="bs" onclick="if(confirm('¿Restaurar datos de ejemplo?')){localStorage.removeItem('mll_data');location.reload()}" style="width:100%;justify-content:center;color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15)">🔄 Restaurar ejemplo</button></div>
      v2.0 — Datos reales al Feb. 2026<br>Normativa: DS 661/2024<br>Municipalidad de Llay-Llay © 2026
    </div>
  </aside>
  <div class="mn">
    <header class="hd">
      <button class="mb" onclick="document.getElementById('sidebar').classList.toggle('closed')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
      <div style="flex:1;display:flex;align-items:center;gap:16px;flex-wrap:wrap"><div><h1 id="hTitle">Resumen</h1><div class="dt" id="hDate"></div></div><div style="flex:1;min-width:180px;max-width:360px;position:relative"><input type="text" id="globalSearch" placeholder="🔍 Buscar en todo el panel..." oninput="doGlobalSearch(this.value)" onblur="setTimeout(function(){var r=document.getElementById(\'gsResults\');if(r)r.style.display=\'none\'},200)" onfocus="if(this.value)doGlobalSearch(this.value)" style="width:100%;padding:8px 14px;border:1px solid rgba(212,212,170,.4);border-radius:20px;background:rgba(254,250,224,.5);font-size:12px;outline:none;font-family:inherit"><div id="gsResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);margin-top:4px;max-height:360px;overflow-y:auto;z-index:100"></div></div></div>
      <div style="background:linear-gradient(135deg,#40916C,#2D6A4F);color:#fff;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;box-shadow:0 2px 8px rgba(64,145,108,.3);margin-right:8px">v17c · FIX EXCEL SUM</div>
      <div class="hr"><div class="nt" id="notifBell" onclick="toggleNotifs(event)"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#52796F" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg><div class="notif-counter" id="notifCounter" style="display:none">0</div></div><div class="av">JA</div></div>
    </header>
    <div id="notifPanel" class="notif-panel">
      <div class="notif-header"><h3>🔔 Centro de Notificaciones</h3><button class="nx" onclick="toggleNotifs(event)">✕</button></div>
      <div class="notif-body" id="notifBody"></div>
    </div>
    <div class="ct" id="content"></div>
  </div>
</div>
<div id="modal" class="mo"><div class="mc" id="mBody"></div></div>
<div id="toast" class="toast"></div>

<script>

var APP_VERSION="2026.04.14.v17c";
var D;
function loadData(){
  try{
    var savedVersion=localStorage.getItem("mll_version");
    var s=localStorage.getItem("mll_data");
    if(!s){
      D=JSON.parse(JSON.stringify(DEF));
    }else{
      D=JSON.parse(s);
      // Migration: ensure new fields/units exist without losing user data
      if(!D.oficios)D.oficios=JSON.parse(JSON.stringify(DEF.oficios));
      if(!D.sumarios)D.sumarios=JSON.parse(JSON.stringify(DEF.sumarios));
      if(!D.trimestrales)D.trimestrales=[];
      if(!D.macroprocesos)D.macroprocesos=JSON.parse(JSON.stringify(DEF.macroprocesos));
      if(!D.procesosRelevantes)D.procesosRelevantes=JSON.parse(JSON.stringify(DEF.procesosRelevantes));
      if(!D.bitacora)D.bitacora=[];
      // Force refresh mercado if old 2025 licitaciones detected
      if(D.mercado&&D.mercado.some(function(m){return(m.oc||"").indexOf("25")>=0&&(m.oc||"").indexOf("2025")<0&&/-L[PEQ]25$/.test(m.oc||"")})){
        D.mercado=JSON.parse(JSON.stringify(DEF.mercado));
      }
      if(D.budget&&!D.budget.cuentas)D.budget.cuentas=DEF.budget.cuentas;
      if(!D.unitNotes)D.unitNotes={};
      if(!D.units)D.units=JSON.parse(JSON.stringify(DEF.units));
      // Add any new units from DEF that don't exist in user data
      DEF.units.forEach(function(defU){
        var exists=D.units.some(function(u){return u.name===defU.name});
        if(!exists){
          D.units.push(JSON.parse(JSON.stringify(defU)));
        }
      });
      // Ensure each unit has a taskList array and tasks have obs field
      D.units.forEach(function(u){
        if(!u.taskList)u.taskList=[];
        u.taskList.forEach(function(t){if(typeof t.obs==="undefined")t.obs=""});
      });
    }
    localStorage.setItem("mll_version",APP_VERSION);
    localStorage.setItem("mll_data",JSON.stringify(D));
  }catch(e){D=JSON.parse(JSON.stringify(DEF))}
}
function save(){try{localStorage.setItem("mll_data",JSON.stringify(D));localStorage.setItem("mll_version",APP_VERSION)}catch(e){}}

// ══════ UNIT TASKS MANAGEMENT ══════
function viewUnitTasks(i){
  var u=D.units[i];if(!u.taskList)u.taskList=[];
  var h='<div class="mh"><h2>📋 Tareas de '+u.name+'</h2><button class="mx" onclick="closeModal()">✕</button></div>';
  h+='<p style="font-size:12px;color:var(--txl);margin-bottom:14px">'+u.full+'</p>';
  // Add new task form
  h+='<div style="background:rgba(64,145,108,.08);border-radius:10px;padding:12px;margin-bottom:14px"><div style="display:flex;gap:8px;flex-wrap:wrap"><input class="fi" type="text" id="ntu" placeholder="Nueva tarea..." style="flex:1 1 200px" onkeydown="if(event.key===\'Enter\')addUnitTask('+i+')"><select class="fi" id="ntp" style="width:auto"><option value="alta">Alta</option><option value="media" selected>Media</option><option value="baja">Baja</option></select><button class="bp" onclick="addUnitTask('+i+')">+ Agregar</button></div></div>';
  // Tasks list
  if(u.taskList.length===0){h+='<p style="text-align:center;color:var(--txl);padding:20px;font-size:13px">No hay tareas registradas para esta unidad.<br>Agrega la primera tarea arriba.</p>';}
  else{
    var pri={alta:0,media:1,baja:2};
    var sorted=u.taskList.slice().sort(function(a,b){
      if(a.done!==b.done)return a.done?1:-1;
      return(pri[a.pri]||1)-(pri[b.pri]||1);
    });
    sorted.forEach(function(t){
      var hasObs=t.obs&&t.obs.trim().length>0;
      h+='<div style="padding:10px 0;border-bottom:1px solid rgba(212,212,170,.15);'+(t.done?"opacity:.55":"")+'">';
      h+='<div style="display:flex;align-items:center;gap:12px">';
      h+='<input type="checkbox" '+(t.done?"checked":"")+' onchange="toggleUnitTask('+i+','+t.id+')">';
      h+='<span class="pd pd-'+t.pri+'" title="'+t.pri+'"></span>';
      h+='<div style="flex:1;font-size:13px;'+(t.done?"text-decoration:line-through":"")+'">'+t.title+'</div>';
      if(hasObs)h+='<span title="Con observaciones" style="font-size:13px;color:var(--info)">💬</span>';
      h+='<button class="be" onclick="editUnitTask('+i+','+t.id+')" title="Editar">✏️</button>';
      h+='<button class="bdel" onclick="deleteUnitTask('+i+','+t.id+')" title="Eliminar">🗑</button>';
      h+='</div>';
      // Notes textarea inline (collapsed if empty, visible if has notes)
      h+='<div style="margin-left:30px;margin-top:6px"><textarea data-uti="'+i+'" data-utid="'+t.id+'" onchange="saveUnitTaskObs(this)" placeholder="📝 Agregar observación o nota..." style="width:calc(100% - 10px);min-height:'+(hasObs?'48':'32')+'px;padding:6px 10px;border-radius:6px;border:1px solid rgba(212,212,170,.4);font-size:12px;font-family:inherit;outline:none;resize:vertical;background:'+(hasObs?"rgba(58,134,168,.05)":"rgba(254,250,224,.4)")+';color:var(--tx);transition:all .2s" onfocus="this.style.borderColor=\'var(--pri-s)\';this.style.minHeight=\'48px\'">'+(t.obs||"")+'</textarea></div>';
      h+='</div>';
    });
  }
  h+='<div class="mf"><button class="bp" onclick="closeModal()">Cerrar</button></div>';
  openModal(h);
}
function addUnitTask(i){
  var inp=document.getElementById("ntu");var pri=document.getElementById("ntp");
  if(!inp||!inp.value.trim())return;
  if(!D.units[i].taskList)D.units[i].taskList=[];
  D.units[i].taskList.push({id:nid(),title:inp.value.trim(),pri:pri.value,done:false,obs:""});
  save();viewUnitTasks(i);toast("Tarea agregada");
}
function toggleUnitTask(i,tid){
  D.units[i].taskList=D.units[i].taskList.map(function(t){return t.id===tid?{id:t.id,title:t.title,pri:t.pri,done:!t.done,obs:t.obs||""}:t});
  save();viewUnitTasks(i);
}
function deleteUnitTask(i,tid){
  if(!confirm("¿Eliminar esta tarea?"))return;
  D.units[i].taskList=D.units[i].taskList.filter(function(t){return t.id!==tid});
  save();viewUnitTasks(i);toast("Tarea eliminada");
}
function saveUnitTaskObs(el){
  var ui=parseInt(el.getAttribute("data-uti"));
  var tid=parseInt(el.getAttribute("data-utid"));
  D.units[ui].taskList=D.units[ui].taskList.map(function(t){return t.id===tid?{id:t.id,title:t.title,pri:t.pri,done:t.done,obs:el.value}:t});
  save();toast("Observación guardada");
}
function editUnitTask(i,tid){
  var t=D.units[i].taskList.filter(function(x){return x.id===tid})[0];if(!t)return;
  var h='<div class="mh"><h2>Editar Tarea</h2><button class="mx" onclick="viewUnitTasks('+i+')">✕</button></div>';
  h+='<div class="fg"><label>Descripción</label><input class="fi" id="eut" value="'+t.title.replace(/"/g,"&quot;")+'"></div>';
  h+='<div class="fg"><label>Prioridad</label><select class="fi" id="eup"><option value="alta"'+(t.pri==="alta"?" selected":"")+'>Alta</option><option value="media"'+(t.pri==="media"?" selected":"")+'>Media</option><option value="baja"'+(t.pri==="baja"?" selected":"")+'>Baja</option></select></div>';
  h+='<div class="fg"><label>Observación / Nota</label><textarea class="fi" id="euo" style="min-height:60px;resize:vertical;font-family:inherit">'+(t.obs||"").replace(/</g,"&lt;")+'</textarea></div>';
  h+='<div class="mf"><button class="bs" onclick="viewUnitTasks('+i+')">Cancelar</button><button class="bp" onclick="saveUnitTask('+i+','+tid+')">Guardar</button></div>';
  openModal(h);
}
function saveUnitTask(i,tid){
  D.units[i].taskList=D.units[i].taskList.map(function(t){return t.id===tid?{id:t.id,title:document.getElementById("eut").value,pri:document.getElementById("eup").value,done:t.done,obs:document.getElementById("euo").value}:t});
  save();viewUnitTasks(i);toast("Tarea actualizada");

function processExcelFiles(){
  var fIng=document.getElementById("xlsIngresos").files[0];
  var fGas=document.getElementById("xlsGastos").files[0];
  if(!fIng&&!fGas){alert("Selecciona al menos un archivo");return}
  var preview=document.getElementById("xlsPreview");
  preview.innerHTML='<p style="text-align:center;color:var(--txl);font-size:13px">⏳ Procesando archivo(s)...</p>';
  var results={ingresos:null,gastos:null};
  var pending=0;
  if(fIng){pending++;parseExcelFile(fIng,"ingresos",function(r){results.ingresos=r;pending--;if(pending===0)applyResults(results)})}
  if(fGas){pending++;parseExcelFile(fGas,"gastos",function(r){results.gastos=r;pending--;if(pending===0)applyResults(results)})}
}

function parseExcelFile(file,type,cb){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:"array"});
      var sheet=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
      // Try to detect month from header
      var month="",year="";
      for(var i=0;i<Math.min(15,rows.length);i++){
        var line=rows[i].join(" ").toUpperCase();
        var mm=line.match(/AL MES DE (\w+) DE (\d{4})/);
        if(mm){month=mm[1];year=mm[2];break}
      }
      // Find code prefix: 115 for ingresos, 215 for gastos
      var prefix=type==="ingresos"?"115":"215";
      var totalRow=null;var subtitles=[];
      for(var j=0;j<rows.length;j++){
        var row=rows[j];if(!row||row.length<3)continue;
        var code=String(row[0]||"").trim();
        if(code===prefix+"-00-00-000-000-000"){totalRow=row}
        // Subtítulo level (e.g. 215-21-00-000-000-000)
        else if(code.match(new RegExp("^"+prefix+"-\\d{2}-00-000-000-000$"))){
          subtitles.push({code:code,name:String(row[1]||"").trim(),row:row});
        }
      }
      if(!totalRow){cb({error:"No se encontró el total ("+prefix+"-00-00-000-000-000) en el archivo"});return}
      // Extract values - column positions for ingresos: vigente=3, devengado_acum=8, percibido_acum=10
      // For gastos: vigente=3, obligado_acum=6, devengado_acum=8, pagado_acum=11
      var result={type:type,month:month,year:year,vigente:parseFloat(totalRow[3])||0};
      if(type==="ingresos"){
        result.devengado=parseFloat(totalRow[8])||0;
        result.percibido=parseFloat(totalRow[10])||0;
      }else{
        result.obligado=parseFloat(totalRow[6])||0;
        result.devengado=parseFloat(totalRow[9])||0;
        result.pagado=parseFloat(totalRow[11])||0;
        // Extract subtitulo distribution for expenses
        result.subtitulos=subtitles.map(function(s){
          return{code:s.code,name:s.name,vigente:parseFloat(s.row[3])||0,pagado:parseFloat(s.row[11])||0};
        }).filter(function(s){return s.vigente>0});
      }
      cb(result);
    }catch(err){cb({error:"Error al leer archivo: "+err.message})}
  };
  reader.readAsArrayBuffer(file);
}

function applyResults(results){
  var preview=document.getElementById("xlsPreview");
  var h='<div style="background:rgba(64,145,108,.08);border:1px solid rgba(64,145,108,.2);border-radius:10px;padding:14px;font-size:13px">';
  var hasError=false;
  if(results.ingresos){
    if(results.ingresos.error){h+='<p style="color:var(--err)">❌ Ingresos: '+results.ingresos.error+'</p>';hasError=true}
    else{
      h+='<p style="margin-bottom:6px"><strong style="color:#40916C">✅ Ingresos detectados</strong>'+(results.ingresos.month?" ("+results.ingresos.month+" "+results.ingresos.year+")":"")+'</p>';
      h+='<div style="font-size:12px;color:var(--txl);margin-bottom:8px">• Vigente: '+formatCLP(results.ingresos.vigente)+'<br>• Devengado: '+formatCLP(results.ingresos.devengado)+'<br>• Percibido: '+formatCLP(results.ingresos.percibido)+'</div>';
    }
  }
  if(results.gastos){
    if(results.gastos.error){h+='<p style="color:var(--err)">❌ Gastos: '+results.gastos.error+'</p>';hasError=true}
    else{
      h+='<p style="margin-bottom:6px"><strong style="color:#BC4749">✅ Gastos detectados</strong>'+(results.gastos.month?" ("+results.gastos.month+" "+results.gastos.year+")":"")+'</p>';
      h+='<div style="font-size:12px;color:var(--txl);margin-bottom:8px">• Vigente: '+formatCLP(results.gastos.vigente)+'<br>• Obligado: '+formatCLP(results.gastos.obligado)+'<br>• Devengado: '+formatCLP(results.gastos.devengado)+'<br>• Pagado: '+formatCLP(results.gastos.pagado)+'<br>• Subtítulos detectados: '+(results.gastos.subtitulos?results.gastos.subtitulos.length:0)+'</div>';
    }
  }
  h+='</div>';
  preview.innerHTML=h;
  if(hasError)return;
  // Apply to D.budget
  var b=D.budget;
  var monthName=(results.ingresos&&results.ingresos.month)||(results.gastos&&results.gastos.month)||"";
  var year=(results.ingresos&&results.ingresos.year)||(results.gastos&&results.gastos.year)||"";
  if(results.ingresos){
    var vMM=Math.round(results.ingresos.vigente/1000000);
    b.totals[0]={l:"Presupuesto Vigente",v:"$"+formatMM(results.ingresos.vigente)+" MM",s:"Total ingresos "+year};
    b.totals[2]={l:"Percibido Acum.",v:"$"+formatMM(results.ingresos.percibido)+" MM",s:"Ingresos efectivos"};
    var pctIng=results.ingresos.vigente>0?(results.ingresos.percibido/results.ingresos.vigente*100).toFixed(1):0;
    // update KPIs
    if(D.kpis&&D.kpis[1]){D.kpis[1].value="$"+formatMM(results.ingresos.percibido)+" MM";D.kpis[1].trend=pctIng+"% del vigente"}
  }
  if(results.gastos){
    b.totals[1]={l:"Devengado Acum.",v:"$"+formatMM(results.gastos.devengado)+" MM",s:((results.gastos.devengado/results.gastos.vigente*100).toFixed(1))+"% ejecutado"};
    b.totals[3]={l:"Pagado Acum.",v:"$"+formatMM(results.gastos.pagado)+" MM",s:"Gastos efectivos"};
    if(results.gastos.subtitulos&&results.gastos.subtitulos.length>0){
      b.subtitulos=results.gastos.subtitulos.map(function(s){return{name:s.name.replace("C X P ",""),vigente:s.vigente,pagado:s.pagado}});
    }
    var pctGas=results.gastos.vigente>0?(results.gastos.pagado/results.gastos.vigente*100).toFixed(1):0;
    if(D.kpis&&D.kpis[0]){D.kpis[0].value=((results.gastos.devengado/results.gastos.vigente*100).toFixed(1))+"%";D.kpis[0].trend=monthName+" "+year}
    if(D.kpis&&D.kpis[2]){D.kpis[2].value="$"+formatMM(results.gastos.pagado)+" MM";D.kpis[2].trend=pctGas+"% del vigente"}
  }
  // Update monthly chart - add new data point or replace existing month
  var monthMap={ENERO:"Ene",FEBRERO:"Feb",MARZO:"Mar",ABRIL:"Abr",MAYO:"May",JUNIO:"Jun",JULIO:"Jul",AGOSTO:"Ago",SEPTIEMBRE:"Sep",OCTUBRE:"Oct",NOVIEMBRE:"Nov",DICIEMBRE:"Dic"};
  var mShort=monthMap[monthName]||monthName.substring(0,3);
  if(mShort){
    var idx=b.months.indexOf(mShort);
    var ingMM=results.ingresos?Math.round(results.ingresos.percibido/1000000):0;
    var gasMM=results.gastos?Math.round(results.gastos.pagado/1000000):0;
    if(idx>=0){
      if(ingMM>0)b.ingresos[idx]=ingMM;
      if(gasMM>0)b.gastos[idx]=gasMM;
    }else{
      b.months.push(mShort);
      b.ingresos.push(ingMM);
      b.gastos.push(gasMM);
    }
  }
  b.lastUpdate="Balance "+monthName+" "+year;
  save();
  setTimeout(function(){closeModal();render();toast("✅ Datos actualizados desde Excel")},1200);
}

function processTrimestralFile(){
  var file=document.getElementById("trUploadFile").files[0];
  var year=document.getElementById("trUploadYear").value;
  var trim=document.getElementById("trUploadTrim").value;
  var name=document.getElementById("trUploadName").value.trim()||("Informe T"+trim+" "+year);
  var obs=document.getElementById("trUploadObs").value;
  if(!file){alert("Selecciona un archivo");return}
  var preview=document.getElementById("trUploadPreview");
  preview.innerHTML='<p style="text-align:center;color:var(--txl);font-size:13px">⏳ Procesando...</p>';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:"array"});
      // Extract all sheets
      var allRows=[];
      var sheetNames=wb.SheetNames;
      sheetNames.forEach(function(sn){
        var sheet=wb.Sheets[sn];
        var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
        if(rows.length>0&&sheetNames.length>1){
          allRows.push(["═══ HOJA: "+sn+" ═══"]);
        }
        rows.forEach(function(r){
          // Trim trailing empty cells, keep rows with at least one value
          var cleaned=r.map(function(c){return String(c||"").trim()});
          while(cleaned.length>0&&cleaned[cleaned.length-1]==="")cleaned.pop();
          if(cleaned.length>0)allRows.push(cleaned);
        });
      });
      var entry={
        id:nid(),
        year:year,
        trimestre:trim,
        nombre:name,
        archivo:file.name,
        fechaCarga:new Date().toLocaleDateString("es-CL"),
        obs:obs,
        contenido:allRows,
        sheets:sheetNames
      };
      D.trimestrales.push(entry);
      save();
      preview.innerHTML='<div style="background:rgba(64,145,108,.1);border:1px solid rgba(64,145,108,.25);border-radius:10px;padding:12px;font-size:13px;color:#1B4332"><strong>✅ Cargado correctamente</strong><br>📊 '+allRows.length+' filas extraídas de '+sheetNames.length+' hoja(s)</div>';
      setTimeout(function(){closeModal();render();toast("✅ Informe cargado")},1200);
    }catch(err){
      preview.innerHTML='<div style="background:rgba(188,71,73,.1);border:1px solid rgba(188,71,73,.25);border-radius:10px;padding:12px;font-size:13px;color:#BC4749">❌ Error al leer archivo: '+err.message+'</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderTrimContent(t,search){
  if(!t.contenido||t.contenido.length===0)return '<p style="padding:20px;text-align:center;color:var(--txl);font-size:13px">Sin contenido extraído</p>';
  var q=(search||"").toLowerCase();
  var visible=t.contenido;
  var matchCount=0;
  if(q){
    visible=t.contenido.filter(function(row){
      var match=row.join(" ").toLowerCase().indexOf(q)>=0;
      if(match)matchCount++;
      return match;
    });
  }
  var h='';
  if(q){h+='<div style="padding:8px 12px;background:rgba(58,134,168,.08);font-size:11px;color:var(--txl);border-bottom:1px solid rgba(212,212,170,.3)">🔍 '+matchCount+' filas coinciden con "'+q+'"</div>';}
  if(visible.length===0){h+='<p style="padding:20px;text-align:center;color:var(--txl);font-size:13px">Sin resultados</p>';return h}
  // Determine max columns
  var maxCols=0;
  visible.forEach(function(r){if(r.length>maxCols)maxCols=r.length});
  if(maxCols>10)maxCols=10;
  h+='<table style="width:100%;border-collapse:collapse;font-size:11px">';
  visible.slice(0,500).forEach(function(row,ri){
    var isHeader=row[0]&&String(row[0]).indexOf("═══")>=0;
    if(isHeader){
      h+='<tr><td colspan="'+maxCols+'" style="padding:8px 12px;background:#1B4332;color:#fff;font-weight:700;font-size:12px">'+row[0]+'</td></tr>';
      return;
    }
    h+='<tr style="background:'+(ri%2===0?"#fff":"rgba(212,212,170,.08)")+'">';
    for(var c=0;c<maxCols;c++){
      var cell=String(row[c]||"");
      if(q&&cell.toLowerCase().indexOf(q)>=0){
        var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
        cell=cell.replace(re,'<mark style="background:#FFE066;padding:0 2px;border-radius:2px">$1</mark>');
      }
      h+='<td style="padding:5px 10px;border-bottom:1px solid rgba(212,212,170,.2);vertical-align:top">'+cell+'</td>';
    }
    h+='</tr>';
  });
  h+='</table>';
  if(visible.length>500)h+='<div style="padding:10px;text-align:center;color:var(--txl);font-size:11px;background:rgba(212,212,170,.1)">Mostrando primeras 500 filas de '+visible.length+'</div>';
  return h;
}

    if(taskFilter.estado==="completadas"&&!t.done)return false;
    if(taskFilter.estado==="vencidas"&&(t.done||t.date>=today))return false;
    if(taskFilter.estado==="hoy"&&t.date!==today)return false;

// ══════ NOTIFICATIONS ══════
function getNotifications(){
  var n=[];
  // Oficios pendientes
  if(D.oficios){D.oficios.forEach(function(o){
    if(o.status==="respondido"||o.status==="completado")return;
    var dl=daysLeft(o.fechaLimite);
    if(dl>30)return;
    var urg=dl<0?"urg":dl<=7?"warn":"soon";
    n.push({type:"oficio",urg:urg,icon:"📄",title:o.nOficio,subtitle:o.materia+" — "+o.responsable,days:dl,daysLabel:dl<0?Math.abs(dl)+"d venc.":dl===0?"HOY":dl+"d",section:"oficios",sortKey:dl});
  })}
  // Compliance pendientes
  if(D.compliance){D.compliance.forEach(function(c){
    if(c.status==="completado")return;
    var dl=daysLeft(c.deadline);
    if(dl>30)return;
    var urg=dl<0?"urg":dl<=7?"warn":"soon";
    n.push({type:"compliance",urg:urg,icon:"⚖️",title:c.title,subtitle:c.entity,days:dl,daysLabel:dl<0?Math.abs(dl)+"d venc.":dl===0?"HOY":dl+"d",section:"compliance",sortKey:dl});
  })}
  // Tareas agenda HOY o mañana
  if(D.tasks){D.tasks.forEach(function(t){
    if(t.done)return;
    var dl=daysLeft(t.date);
    if(dl<-1||dl>3)return;
    var urg=dl<0?"urg":dl<=1?"warn":"soon";
    n.push({type:"task",urg:urg,icon:"📅",title:t.title,subtitle:"Agenda — "+t.cat,days:dl,daysLabel:dl<0?"venc.":dl===0?"HOY":dl===1?"mañana":dl+"d",section:"tareas",sortKey:dl});
  })}
  // Tareas alta prioridad por unidad (no done)
  if(D.units){D.units.forEach(function(u,ui){
    if(!u.taskList)return;
    u.taskList.forEach(function(t){
      if(t.done||t.pri!=="alta")return;
      n.push({type:"unit",urg:"high",icon:"🎯",title:t.title,subtitle:"Unidad: "+u.name,days:999,daysLabel:"alta",section:"unidades",sortKey:1000+ui});
    });
  })}
  // Sort: urg first, then warn, then soon, then high
  var order={urg:0,warn:1,soon:2,high:3};
  n.sort(function(a,b){var oa=order[a.urg],ob=order[b.urg];if(oa!==ob)return oa-ob;return a.sortKey-b.sortKey});
  return n;
}

function updateNotifBadge(){

  var critical=n.filter(function(x){return x.urg==="urg"||x.urg==="warn"}).length;
  if(critical>0){c.textContent=critical>99?"99+":critical;c.style.display="flex"}
  else{c.style.display="none"}
}

}

function renderNotifPanel(){
  var n=getNotifications();
  var b=document.getElementById("notifBody");
  if(n.length===0){
    b.innerHTML='<div class="notif-empty"><span class="notif-empty-icon">✨</span>No tienes notificaciones pendientes.<br><span style="font-size:11px">Todo está bajo control.</span></div>';
    return;
  }
  // Group by urgency
  var groups={urg:[],warn:[],soon:[],high:[]};
  n.forEach(function(x){groups[x.urg].push(x)});
  var titles={urg:"🔴 URGENTE / VENCIDO",warn:"🟡 PRÓXIMO A VENCER",soon:"🔵 ESTA SEMANA",high:"🟣 ALTA PRIORIDAD"};
  var h="";
  ["urg","warn","soon","high"].forEach(function(k){
    if(groups[k].length===0)return;
    h+='<div class="notif-section"><div class="notif-section-title">'+titles[k]+' · '+groups[k].length+'</div>';
    groups[k].forEach(function(x){
      h+='<div class="notif-item '+x.urg+'" onclick="goToSection(\''+x.section+'\')">';
      h+='<div class="notif-icon">'+x.icon+'</div>';
      h+='<div class="notif-content"><div class="notif-title">'+x.title+'</div><div class="notif-meta">'+x.subtitle+'</div></div>';
      h+='<div class="notif-days '+x.urg+'">'+x.daysLabel+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  b.innerHTML=h;
}

function rTrimDashboard(t){

  var rows=t.contenido.filter(function(r){return r.length>=2&&r[0]&&!String(r[0]).startsWith('═')});
  var labels=[],vals=[];
  for(var i=0;i<Math.min(rows.length,15);i++){
    var r=rows[i];var num=null;
    for(var j=1;j<r.length;j++){
      var n=parseFloat(String(r[j]).replace(/[^0-9.-]/g,''));
      if(!isNaN(n)&&n>0){num=n;break}
    }
    if(num!==null&&String(r[0]).length<60){labels.push(String(r[0]).substring(0,30));vals.push(num)}

  if(labels.length<2)return '';

  setTimeout(function(){

    if(ctx)charts.push(new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'Valor',data:vals,backgroundColor:'#40916C',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:45,minRotation:30}},y:{ticks:{font:{size:10}}}}}}));

}

  h+='<p style="font-size:13px;color:var(--txl);margin-bottom:14px;line-height:1.6">Sube un archivo Excel con sumarios. Columnas esperadas: <strong>Tipo, Decreto, Fecha Decreto, Fiscal, Materia, Plazo, Estado, Observaciones</strong>. La primera fila debe ser el encabezado.</p>';
  h+='<div class="fg"><label>Archivo Excel (.xls / .xlsx)</label><input class="fi" type="file" id="sxF" accept=".xls,.xlsx"></div>';
  h+='<div id="sxP" style="margin-top:14px"></div>';
  h+='<div class="mf"><button class="bs" onclick="closeModal()">Cancelar</button><button class="bp" onclick="processSumExcel()">Cargar</button></div>';
  openModal(h);
}
function processSumExcel(){
  var file=document.getElementById("sxF").files[0];if(!file){alert("Selecciona un archivo");return}
  var p=document.getElementById("sxP");p.innerHTML='<p style="color:var(--txl);font-size:13px">⏳ Procesando...</p>';
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:"",raw:false,dateNF:"yyyy-mm-dd"});
      var added=0,errores=[];
      var validStatus=["instruccion","vista_fiscal","cargos","resolucion","cerrado","sobreseido"];
      for(var i=1;i<rows.length;i++){
        var row=rows[i];if(!row||(!row[0]&&!row[1]&&!row[4]))continue;
        try{
          var tipo=String(row[0]||"investigacion").toLowerCase().indexOf("sumario")>=0?"sumario":"investigacion";
          // Normalize date: handle Excel serial numbers, Date objects, and strings
          var fecha=row[2];var fechaStr="";
          if(fecha instanceof Date&&!isNaN(fecha)){fechaStr=fecha.toISOString().slice(0,10)}
          else if(typeof fecha==="number"&&fecha>1){var d=new Date(Math.round((fecha-25569)*86400*1000));if(!isNaN(d))fechaStr=d.toISOString().slice(0,10)}
          else if(fecha){var s=String(fecha).trim();var m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);if(m){var dd=m[1].padStart(2,"0"),mm=m[2].padStart(2,"0"),yy=m[3].length===2?"20"+m[3]:m[3];fechaStr=yy+"-"+mm+"-"+dd}else if(/^\d{4}-\d{2}-\d{2}/.test(s)){fechaStr=s.slice(0,10)}}
          if(!fechaStr||!/^\d{4}-\d{2}-\d{2}$/.test(fechaStr))fechaStr=new Date().toISOString().slice(0,10);
          // Normalize status
          var rawStatus=String(row[6]||"").toLowerCase().trim().replace(/\s+/g,"_").replace(/ó/g,"o").replace(/í/g,"i").replace(/á/g,"a").replace(/é/g,"e");
          if(validStatus.indexOf(rawStatus)<0)rawStatus="instruccion";
          D.sumarios.push({id:nid(),tipo:tipo,decreto:String(row[1]||"").trim(),fechaDecreto:fechaStr,fiscal:String(row[3]||"").trim(),materia:String(row[4]||"").trim(),plazoBase:parseInt(row[5])||(tipo==="sumario"?20:5),status:rawStatus,obs:String(row[7]||"").trim()});
          added++;
        }catch(errRow){errores.push("Fila "+(i+1)+": "+errRow.message)}
      }
      save();
      var msg='<div style="background:rgba(64,145,108,.1);padding:12px;border-radius:8px;color:#1B4332;font-size:13px"><strong>✅ '+added+' sumarios cargados</strong></div>';
      if(errores.length>0)msg+='<div style="background:rgba(221,161,94,.1);padding:12px;border-radius:8px;color:#856404;font-size:12px;margin-top:8px">⚠️ '+errores.length+' filas con problemas (ignoradas)</div>';
      p.innerHTML=msg;
      setTimeout(function(){closeModal();render();toast("✅ "+added+" sumarios cargados")},1500);
    }catch(err){p.innerHTML='<div style="background:rgba(188,71,73,.1);padding:12px;border-radius:8px;color:#BC4749;font-size:13px">❌ '+err.message+'</div>'}
  };
  r.readAsArrayBuffer(file);
}

// ══════ EXCEL UPLOAD: PROYECTOS ══════
function openProjExcel(){
  var h='<div class="mh"><h2>📂 Cargar Proyectos desde Excel</h2><button class="mx" onclick="closeModal()">✕</button></div>';
  h+='<p style="font-size:13px;color:var(--txl);margin-bottom:14px;line-height:1.6">Sube un archivo Excel con proyectos. Columnas esperadas: <strong>Nombre, Unidad, Presupuesto, Avance%, Estado, Financiamiento, Urgencia</strong>. La primera fila debe ser el encabezado.</p>';
  h+='<div class="fg"><label>Archivo Excel (.xls / .xlsx)</label><input class="fi" type="file" id="pxF" accept=".xls,.xlsx"></div>';
  h+='<div id="pxP" style="margin-top:14px"></div>';
  h+='<div class="mf"><button class="bs" onclick="closeModal()">Cancelar</button><button class="bp" onclick="processProjExcel()">Cargar</button></div>';
  openModal(h);
}
function processProjExcel(){
  var file=document.getElementById("pxF").files[0];if(!file){alert("Selecciona un archivo");return}
  var p=document.getElementById("pxP");p.innerHTML='<p style="color:var(--txl);font-size:13px">⏳ Procesando...</p>';
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});
      var added=0;
      for(var i=1;i<rows.length;i++){
        var r=rows[i];if(!r[0])continue;
        var st=String(r[4]||"ejecucion").toLowerCase().replace(/ /g,"_").replace("ó","o");
        if(["pendiente","diseno","licitacion","ejecucion","completado"].indexOf(st)<0)st="ejecucion";
        var ur=String(r[6]||"media").toLowerCase();
        if(["alta","media","baja"].indexOf(ur)<0)ur="media";
        D.projects.push({id:nid(),name:String(r[0]||""),unit:String(r[1]||""),budget:String(r[2]||""),progress:parseInt(r[3])||0,status:st,financiamiento:String(r[5]||""),urgencia:ur});
        added++;
      }
      save();p.innerHTML='<div style="background:rgba(64,145,108,.1);padding:12px;border-radius:8px;color:#1B4332;font-size:13px"><strong>✅ '+added+' proyectos cargados</strong></div>';
      setTimeout(function(){closeModal();render();toast("✅ "+added+" proyectos cargados")},1200);
    }catch(err){p.innerHTML='<div style="background:rgba(188,71,73,.1);padding:12px;border-radius:8px;color:#BC4749;font-size:13px">❌ '+err.message+'</div>'}
  };
  r.readAsArrayBuffer(file);
}


// ══════ BITÁCORA / LOG ══════
function logAction(accion,detalle,seccion){
  if(!D.bitacora)D.bitacora=[];
  D.bitacora.unshift({id:nid(),fecha:new Date().toISOString(),accion:accion,detalle:detalle,seccion:seccion});
  if(D.bitacora.length>500)D.bitacora=D.bitacora.slice(0,500);
}
function rBitacora(){
  if(!D.bitacora)D.bitacora=[];
  var el=document.getElementById("sc");
  var h='<p style="font-size:14px;color:var(--txl);margin-bottom:20px;line-height:1.6">Registro automático de acciones realizadas en el panel. Útil para trazabilidad administrativa de decisiones y cambios.</p>';
  // Filter bar
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:rgba(254,250,224,.5);border-radius:10px;align-items:center"><span style="font-size:12px;font-weight:600;color:var(--txl)">🔍 Filtrar:</span>';
  h+='<input class="fi" type="text" id="bSearch" placeholder="Buscar en bitácora..." oninput="filterBitacora(this.value)" style="flex:1;min-width:200px;padding:6px 12px">';
  h+='<button class="bs" onclick="if(confirm(\'¿Vaciar toda la bitácora?\')){D.bitacora=[];save();render();toast(\'Bitácora vaciada\')}">🗑 Vaciar</button></div>';
  h+='<div class="cd" id="bList"></div>';
  el.innerHTML=h;
  filterBitacora("");
}
function filterBitacora(q){
  var list=document.getElementById("bList");if(!list)return;
  q=(q||"").trim().toLowerCase();
  var filtered=D.bitacora.filter(function(b){if(!q)return true;return(b.accion+" "+b.detalle+" "+b.seccion).toLowerCase().indexOf(q)>=0});
  if(filtered.length===0){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--txl)"><div style="font-size:36px;margin-bottom:8px">📋</div><p style="font-size:14px">'+(D.bitacora.length===0?"Sin registros aún. Las acciones que realices aparecerán aquí.":"Sin resultados para la búsqueda.")+'</p></div>';return}
  var h='';var lastDate="";
  var secColors={oficios:"#3A86A8",sumarios:"#9D4EDD",macroprocesos:"#BC4749",proyectos:"#40916C",unidades:"#D4A373"};
  filtered.forEach(function(b){
    var d=new Date(b.fecha);
    var dateStr=d.toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    var timeStr=d.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
    if(dateStr!==lastDate){lastDate=dateStr;h+='<div style="font-size:11px;font-weight:700;color:var(--txl);text-transform:uppercase;letter-spacing:.6px;padding:12px 16px 6px;border-bottom:1px solid rgba(212,212,170,.2)">'+dateStr+'</div>'}
    var col=secColors[b.seccion]||"#52796F";
    h+='<div style="display:flex;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(212,212,170,.1);align-items:flex-start"><div style="min-width:3px;background:'+col+';align-self:stretch;border-radius:2px"></div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+b.accion+'</div><div style="font-size:11px;color:var(--txl);margin-top:2px">'+b.detalle+'</div></div>';
    h+='<div style="font-size:11px;color:var(--txl);white-space:nowrap">'+timeStr+'</div></div>';
  });
  list.innerHTML=h;
}

// ══════ CALENDARIO UNIFICADO ══════
var calMonth=new Date().getMonth(),calYear=new Date().getFullYear();
function rCalendario(){
  var el=document.getElementById("sc");
  var months=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  // Collect all dated events
  var events={};
  var addEv=function(date,tipo,titulo,color,sec){if(!date)return;if(!events[date])events[date]=[];events[date].push({tipo:tipo,titulo:titulo,color:color,sec:sec})};
  (D.oficios||[]).forEach(function(o){if(o.status!=="respondido"&&o.status!=="completado")addEv(o.fechaLimite,"Oficio",o.nOficio,"#3A86A8","oficios")});
  (D.sumarios||[]).forEach(function(s){if(s.status!=="cerrado"&&s.status!=="sobreseido"){var lim=addDays(s.fechaDecreto,s.plazoBase);addEv(lim,"Sumario",s.decreto,"#9D4EDD","sumarios")}});
  (D.compliance||[]).forEach(function(c){if(c.status!=="completado")addEv(c.deadline,"Compliance",c.title,"#40916C","compliance")});
  (D.tasks||[]).forEach(function(t){if(!t.done)addEv(t.date,"Agenda",t.title,"#D4A373","tareas")});
  (D.macroprocesos||[]).forEach(function(mp){mp.etapas.forEach(function(e){if(e.status!=="completado")addEv(e.plazo,"Macro",mp.nombre+" → "+e.nombre,mp.color,"macroprocesos")})});
  var h='<p style="font-size:14px;color:var(--txl);margin-bottom:20px;line-height:1.6">Vista unificada de todos los plazos: oficios, sumarios, agenda, compliance y etapas de macroprocesos.</p>';
  // Nav
  h+='<div class="cd mb24"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap"><button class="bs" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}rCalendario()">◀</button>';
  h+='<h3 style="flex:1;text-align:center;font-size:18px;font-weight:700;margin:0">'+months[calMonth]+' '+calYear+'</h3>';
  h+='<button class="bs" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}rCalendario()">▶</button>';
  h+='<button class="bs" onclick="calMonth=new Date().getMonth();calYear=new Date().getFullYear();rCalendario()">Hoy</button></div>';
  // Build grid
  var first=new Date(calYear,calMonth,1);
  var dayOfWeek=first.getDay();var startOffset=dayOfWeek===0?6:dayOfWeek-1;
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var todayStr=new Date().toISOString().slice(0,10);
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:11px">';
  ["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"].forEach(function(d){h+='<div style="text-align:center;font-weight:700;color:var(--txl);padding:6px 0">'+d+'</div>'});
  for(var i=0;i<startOffset;i++)h+='<div style="min-height:90px;background:rgba(212,212,170,.05);border-radius:6px"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var ds=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var dayEvents=events[ds]||[];
    var isToday=ds===todayStr;
    var bg=isToday?"rgba(64,145,108,.12)":"#fff";
    var border=isToday?"2px solid #40916C":"1px solid rgba(212,212,170,.25)";
    h+='<div style="min-height:90px;background:'+bg+';border:'+border+';border-radius:6px;padding:4px 6px;overflow:hidden">';
    h+='<div style="font-size:12px;font-weight:'+(isToday?"700":"600")+';color:'+(isToday?"#40916C":"var(--tx)")+';margin-bottom:3px">'+d+'</div>';
    dayEvents.slice(0,3).forEach(function(ev){
      h+='<div title="'+ev.titulo.replace(/"/g,"&quot;")+'" onclick="sec=\''+ev.sec+'\';buildNav();render()" style="background:'+ev.color+';color:#fff;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+ev.titulo.substring(0,22)+'</div>';
    });
    if(dayEvents.length>3)h+='<div style="font-size:9px;color:var(--txl);font-weight:600">+'+(dayEvents.length-3)+' más</div>';
    h+='</div>';
  }
  h+='</div></div>';
  // Legend
  h+='<div class="cd"><h4 style="margin:0 0 10px;font-size:13px;font-weight:600">Leyenda</h4><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px">';
  [{c:"#3A86A8",l:"Oficios Contraloría"},{c:"#9D4EDD",l:"Sumarios"},{c:"#40916C",l:"Compliance"},{c:"#D4A373",l:"Agenda"},{c:"#BC4749",l:"Macroprocesos"}].forEach(function(x){h+='<div style="display:flex;gap:6px;align-items:center"><span style="width:12px;height:12px;background:'+x.c+';border-radius:3px"></span>'+x.l+'</div>'});
  h+='</div></div>';
  el.innerHTML=h;
}

// ══════ ADJUNTOS PDF ══════
function renderAdjuntos(item,type,idx){
  var h='<div style="margin-top:10px"><div style="font-size:11px;font-weight:600;color:var(--txl);margin-bottom:6px">📎 Adjuntos</div>';
  if(item.adjuntos&&item.adjuntos.length>0){
    item.adjuntos.forEach(function(a,ai){
      var sz=(a.size/1024).toFixed(0);
      h+='<div style="display:flex;gap:8px;align-items:center;padding:6px 10px;background:rgba(58,134,168,.08);border-radius:6px;margin-bottom:4px;font-size:11px"><span>📄</span><div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+a.nombre+' <span style="color:var(--txl)">('+sz+' KB)</span></div><button class="be" onclick="downloadAdjunto(\''+type+'\','+idx+','+ai+')">⬇</button><button class="bdel" onclick="deleteAdjunto(\''+type+'\','+idx+','+ai+')">🗑</button></div>';
    });
  }
  h+='<div style="margin-top:6px"><input type="file" id="adjFile_'+type+'_'+idx+'" accept=".pdf,.doc,.docx" style="font-size:11px" onchange="addAdjunto(\''+type+'\','+idx+',this)"></div></div>';
  return h;
}
function addAdjunto(type,idx,input){
  var file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){alert("Archivo muy grande (máx 2 MB)");input.value="";return}
  var r=new FileReader();
  r.onload=function(e){
    var arr=type==="oficio"?D.oficios:D.sumarios;
    if(!arr[idx].adjuntos)arr[idx].adjuntos=[];
    arr[idx].adjuntos.push({nombre:file.name,size:file.size,data:e.target.result,fecha:new Date().toISOString()});
    save();render();toast("✅ Adjunto guardado");
  };
  r.readAsDataURL(file);
}
function downloadAdjunto(type,idx,ai){
  var arr=type==="oficio"?D.oficios:D.sumarios;
  var a=arr[idx].adjuntos[ai];
  var link=document.createElement("a");link.href=a.data;link.download=a.nombre;link.click();
}
function deleteAdjunto(type,idx,ai){
  if(!confirm("¿Eliminar este adjunto?"))return;
  var arr=type==="oficio"?D.oficios:D.sumarios;
  arr[idx].adjuntos.splice(ai,1);save();render();toast("Adjunto eliminado");
}


// ══════ PROCESOS RELEVANTES ══════
function rProcesosRel(){
  if(!D.procesosRelevantes)D.procesosRelevantes=[];
  var el=document.getElementById("sc");
  var h='<p style="font-size:14px;color:var(--txl);margin-bottom:20px;line-height:1.6">Procesos relevantes que lleva la Administración Municipal durante el año. Agrega los que estés gestionando y haz seguimiento a sus etapas, plazos y estados.</p>';
  h+='<div style="margin-bottom:20px;text-align:right"><button class="bp" onclick="addProcesoRel()">+ Nuevo Proceso</button></div>';
  if(D.procesosRelevantes.length===0){
    h+='<div class="cd" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:10px">📋</div><p style="font-size:14px;color:var(--txl);margin-bottom:6px">Aún no tienes procesos relevantes registrados.</p><p style="font-size:12px;color:var(--txl)">Haz clic en <strong>"+ Nuevo Proceso"</strong> para comenzar.</p></div>';
    el.innerHTML=h;return;
  }
  D.procesosRelevantes.forEach(function(pr,pi){
    var total=pr.etapas.length;
    var done=pr.etapas.filter(function(e){return e.status==='completado'}).length;
    var pct=total>0?Math.round(done/total*100):0;
    var overdue=pr.etapas.filter(function(e){return e.status!=='completado'&&daysLeft(e.plazo)<0}).length;
    h+='<div class="cd mb24" style="border-left:4px solid '+pr.color+'">';
    h+='<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap"><div style="width:44px;height:44px;border-radius:50%;background:'+pr.color+'15;display:flex;align-items:center;justify-content:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="'+pr.color+'" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect width="8" height="4" x="8" y="2" rx="1"/></svg></div>';
    h+='<div style="flex:1"><div style="font-size:17px;font-weight:700">'+pr.nombre+'</div><div style="font-size:12px;color:var(--txl);margin-top:2px">'+(pr.desc||'').substring(0,150)+(pr.desc&&pr.desc.length>150?'...':'')+'</div></div>';
    h+='<div style="text-align:center;min-width:70px"><div style="font-size:22px;font-weight:700;color:'+pr.color+'">'+pct+'%</div><div style="font-size:10px;color:var(--txl)">'+done+'/'+total+' etapas</div></div>';
    h+='<button class="be" onclick="editProcesoRel('+pi+')" title="Editar proceso">✏️</button>';
    h+='<button class="bdel" onclick="delProcesoRel('+pi+')" title="Eliminar proceso">🗑</button></div>';
    h+='<div style="height:8px;background:#eee;border-radius:4px;margin-bottom:14px"><div style="width:'+pct+'%;height:100%;background:'+pr.color+';border-radius:4px;transition:width .3s"></div></div>';
    if(overdue>0)h+='<div style="background:rgba(188,71,73,.08);border-left:3px solid #BC4749;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#BC4749;font-weight:600">⚠️ '+overdue+' etapa'+(overdue>1?'s':'')+' con plazo vencido</div>';
    h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:'+pr.color+'10"><th style="padding:8px 12px;text-align:left">Etapa</th><th style="padding:8px 12px;text-align:center;width:100px">Plazo</th><th style="padding:8px 12px;text-align:center;width:80px">Días</th><th style="padding:8px 12px;text-align:center;width:120px">Estado</th><th style="padding:8px 12px;text-align:left">Observaciones</th><th style="padding:8px 12px;width:50px"></th></tr></thead><tbody>';
    pr.etapas.forEach(function(et,ei){
      var dl=daysLeft(et.plazo);var isDone=et.status==='completado';var dc2=isDone?'ok':daysClass(dl);
      h+='<tr style="border-bottom:1px solid rgba(212,212,170,.2);'+(isDone?'opacity:.55':'')+'"><td style="padding:8px 12px;font-weight:500">'+et.nombre+'</td>';
      h+='<td style="padding:8px 12px;text-align:center;font-size:11px">'+(et.plazo?fd(et.plazo):'—')+'</td>';
      h+='<td style="padding:8px 12px;text-align:center"><span class="notif-days '+dc2+'" style="font-size:10px">'+(isDone?'✓':(et.plazo?daysLabel(dl):'—'))+'</span></td>';
      h+='<td style="padding:8px 12px;text-align:center">'+bd(et.status)+'</td>';
      h+='<td style="padding:8px 12px;font-size:11px;color:var(--txl);font-style:italic">'+(et.obs||'—')+'</td>';

function doGlobalSearch(q){
  var r=document.getElementById("gsResults");if(!r)return;
  q=(q||"").trim().toLowerCase();
  if(q.length<2){r.style.display="none";return}
  var results=[];
  var add=function(tipo,titulo,sub,sec,color){results.push({tipo:tipo,titulo:titulo,sub:sub,sec:sec,color:color})};
  (D.oficios||[]).forEach(function(o){if((o.nOficio+" "+o.materia+" "+o.responsable+" "+(o.obs||"")).toLowerCase().indexOf(q)>=0)add("Oficio",o.nOficio+" — "+o.materia,o.responsable,"oficios","#3A86A8")});
  (D.sumarios||[]).forEach(function(s){if((s.decreto+" "+s.materia+" "+s.fiscal+" "+(s.obs||"")).toLowerCase().indexOf(q)>=0)add("Sumario",s.decreto+" — "+s.materia,"Fiscal: "+s.fiscal,"sumarios","#9D4EDD")});
  (D.projects||[]).forEach(function(p){if((p.name+" "+p.unit+" "+(p.financiamiento||"")).toLowerCase().indexOf(q)>=0)add("Proyecto",p.name,p.unit+" · "+p.budget,"proyectos","#40916C")});
  (D.mercado||[]).forEach(function(m){if(((m.oc||"")+" "+(m.nombre||m.prov||"")+" "+(m.tipo||"")).toLowerCase().indexOf(q)>=0)add("Licitación",(m.oc||"")+" — "+(m.nombre||m.prov||""),(m.estado||"")+" · "+(m.tipo||""),"contratacion","#D4A373")});
  (D.units||[]).forEach(function(u){if(!u.taskList)return;u.taskList.forEach(function(t){if((t.title+" "+(t.obs||"")).toLowerCase().indexOf(q)>=0)add("Tarea",t.title,"Unidad: "+u.name,"unidades",u.color)})});
  (D.macroprocesos||[]).forEach(function(mp){if(mp.nombre.toLowerCase().indexOf(q)>=0||mp.desc.toLowerCase().indexOf(q)>=0||(mp.notas||"").toLowerCase().indexOf(q)>=0)add("Macroproceso",mp.nombre,mp.desc.substring(0,60)+"...","macroprocesos",mp.color);mp.etapas.forEach(function(e){if((e.nombre+" "+(e.obs||"")).toLowerCase().indexOf(q)>=0)add("Etapa Macro",e.nombre,mp.nombre,"macroprocesos",mp.color)})});
  (D.compliance||[]).forEach(function(c2){if((c2.title+" "+(c2.entity||"")).toLowerCase().indexOf(q)>=0)add("Compliance",c2.title,c2.entity,"compliance","#40916C")});
  // Render results
  if(results.length===0){r.innerHTML='<div style="padding:14px;text-align:center;color:var(--txl);font-size:13px">Sin resultados para "'+q+'"</div>';r.style.display="block";return}
  var h='<div style="padding:8px 12px;font-size:10px;color:var(--txl);background:rgba(212,212,170,.15);border-bottom:1px solid rgba(212,212,170,.3);text-transform:uppercase;letter-spacing:.6px">'+results.length+' resultado(s)</div>';
  results.slice(0,20).forEach(function(x){
    h+='<div style="padding:10px 14px;border-bottom:1px solid rgba(212,212,170,.15);cursor:pointer;display:flex;gap:10px;align-items:flex-start" onmouseover="this.style.background=\'rgba(212,212,170,.1)\'" onmouseout="this.style.background=\'\'" onmousedown="sec=\''+x.sec+'\';buildNav();render();document.getElementById(\'globalSearch\').value=\'\';document.getElementById(\'gsResults\').style.display=\'none\'">';
    h+='<span style="background:'+x.color+';color:#fff;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px">'+x.tipo+'</span>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:var(--tx)">'+x.titulo+'</div><div style="font-size:11px;color:var(--txl);margin-top:2px">'+x.sub+'</div></div></div>';
  });
  if(results.length>20)h+='<div style="padding:8px;text-align:center;font-size:11px;color:var(--txl)">Y '+(results.length-20)+' resultado(s) más...</div>';
  r.innerHTML=h;r.style.display="block";
}

function exportData(){
  var payload={version:APP_VERSION,exportedAt:new Date().toISOString(),data:D};
  var str=JSON.stringify(payload,null,2);var blob=new Blob([str],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="respaldo_llayllay_"+new Date().toISOString().slice(0,10)+".json";a.click();toast("✅ Respaldo exportado");
}
function importData(input){
  var file=input.files[0];if(!file)return;
  if(!confirm("¿Restaurar respaldo? Esta acción reemplazará todos los datos actuales.")){input.value="";return}
  var r=new FileReader();
  r.onload=function(e){
    try{
      var p=JSON.parse(e.target.result);
      var imported=p.data||p;
      if(!imported.units||!Array.isArray(imported.units))throw new Error("Archivo inválido");
      D=imported;
      // Ensure all current fields exist
      if(!D.oficios)D.oficios=JSON.parse(JSON.stringify(DEF.oficios));
      if(!D.sumarios)D.sumarios=JSON.parse(JSON.stringify(DEF.sumarios));
      if(!D.trimestrales)D.trimestrales=[];
      if(!D.macroprocesos)D.macroprocesos=JSON.parse(JSON.stringify(DEF.macroprocesos));
      if(!D.procesosRelevantes)D.procesosRelevantes=JSON.parse(JSON.stringify(DEF.procesosRelevantes));
      if(!D.bitacora)D.bitacora=[];
      if(!D.budget.cuentas)D.budget.cuentas=DEF.budget.cuentas;
      save();render();toast("✅ Respaldo restaurado");
    }catch(err){alert("Error al importar: "+err.message)}
    input.value="";
  };
  r.readAsText(file);
}

var GAPI_CLIENT_ID="1007777115422-m012pqlaluphdf14bvdipcm9et0e5v1r.apps.googleusercontent.com";
var GAPI_API_KEY="AIzaSyA-r7sIBklSg_phN6Lpq6wUiA_LEUtgBOs";
var GAPI_SCOPES="https://www.googleapis.com/auth/drive.file";
var GAPI_DISCOVERY="https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
var DRIVE_FILENAME="panel_llayllay_data.json";
var DRIVE_FOLDER_NAME="Panel_AdminMunicipal_LlayLlay";

var gdState={ready:false,authed:false,folderId:null,fileId:null,lastSync:null,tokenClient:null,syncing:false,autoSyncInterval:null};

function gdriveLog(msg){var s=document.getElementById("gdriveStatus");if(s){s.textContent=msg;s.style.display="block"}console.log("[Drive]",msg)}

function gdriveInit(){
  if(GAPI_CLIENT_ID.indexOf("TU_CLIENT_ID")===0){gdriveLog("⚠️ Configurar credenciales");return}
  try{
    gapi.load("client",function(){
      gapi.client.init({apiKey:GAPI_API_KEY,discoveryDocs:[GAPI_DISCOVERY]}).then(function(){
        gdState.tokenClient=google.accounts.oauth2.initTokenClient({client_id:GAPI_CLIENT_ID,scope:GAPI_SCOPES,callback:gdriveOnAuth});
        gdState.ready=true;gdriveLog("☁️ Drive listo — haz clic para conectar");
        // Auto-connect if previously authed
        var saved=localStorage.getItem("gdrive_token");
        if(saved){try{var t=JSON.parse(saved);if(t.expires>Date.now()){gapi.client.setToken(t);gdState.authed=true;gdriveAfterAuth()}}catch(e){}}
      });
    });
  }catch(e){gdriveLog("❌ Error inicializando: "+e.message)}
}

function gdriveConnect(){
  if(!gdState.ready){gdriveLog("⚠️ Aún no listo, espera un momento...");setTimeout(gdriveInit,500);return}
  if(gdState.authed){if(confirm("¿Desconectar Google Drive? Los datos locales se mantienen."))gdriveDisconnect();return}
  gdState.tokenClient.requestAccessToken({prompt:"consent"});
}

function gdriveDisconnect(){
  gdState.authed=false;gdState.fileId=null;gdState.folderId=null;
  localStorage.removeItem("gdrive_token");
  if(gdState.autoSyncInterval){clearInterval(gdState.autoSyncInterval);gdState.autoSyncInterval=null}
  document.getElementById("gdriveBtn").innerHTML="☁️ Conectar Drive";
  document.getElementById("gdriveSyncBtn").style.display="none";
  gdriveLog("Desconectado");toast("Drive desconectado");
}

function gdriveOnAuth(resp){
  if(resp.error){gdriveLog("❌ Error auth: "+resp.error);return}
  gdState.authed=true;
  // Save token with expiry
  var token=gapi.client.getToken();
  if(token){localStorage.setItem("gdrive_token",JSON.stringify({access_token:token.access_token,expires:Date.now()+3500000}))}
  gdriveAfterAuth();
}

function gdriveAfterAuth(){
  document.getElementById("gdriveBtn").innerHTML="✅ Drive conectado";
  document.getElementById("gdriveSyncBtn").style.display="block";
  gdriveLog("🔍 Buscando carpeta...");
  gdriveFindOrCreateFolder().then(function(){
    return gdriveFindOrCreateFile();
  }).then(function(){
    gdriveLog("✅ Listo. Sincronizando...");
    return gdriveSyncNow();
  }).then(function(){
    // Auto-sync every 60 seconds
    if(gdState.autoSyncInterval)clearInterval(gdState.autoSyncInterval);
    gdState.autoSyncInterval=setInterval(function(){if(gdState.authed&&!gdState.syncing)gdriveSyncNow()},60000);
  }).catch(function(e){gdriveLog("❌ "+e.message)});
}

function gdriveFindOrCreateFolder(){
  return gapi.client.drive.files.list({q:"name='"+DRIVE_FOLDER_NAME+"' and mimeType='application/vnd.google-apps.folder' and trashed=false",fields:"files(id,name)"}).then(function(r){
    if(r.result.files.length>0){gdState.folderId=r.result.files[0].id;return gdState.folderId}
    return gapi.client.drive.files.create({resource:{name:DRIVE_FOLDER_NAME,mimeType:"application/vnd.google-apps.folder"},fields:"id"}).then(function(r2){gdState.folderId=r2.result.id;return gdState.folderId});
  });
}

function gdriveFindOrCreateFile(){
  return gapi.client.drive.files.list({q:"name='"+DRIVE_FILENAME+"' and '"+gdState.folderId+"' in parents and trashed=false",fields:"files(id,name,modifiedTime)"}).then(function(r){
    if(r.result.files.length>0){gdState.fileId=r.result.files[0].id;return gdState.fileId}
    // Create empty file
    var metadata={name:DRIVE_FILENAME,parents:[gdState.folderId],mimeType:"application/json"};
    var boundary="-------314159265358979323846";
    var body="--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(metadata)+"\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+JSON.stringify({data:D,version:APP_VERSION,updatedAt:new Date().toISOString()})+"\r\n--"+boundary+"--";
    return gapi.client.request({path:"/upload/drive/v3/files",method:"POST",params:{uploadType:"multipart",fields:"id"},headers:{"Content-Type":"multipart/related; boundary="+boundary},body:body}).then(function(r2){gdState.fileId=r2.result.id;return gdState.fileId});
  });
}

function gdriveSyncNow(){
  if(!gdState.authed||!gdState.fileId||gdState.syncing)return Promise.resolve();
  gdState.syncing=true;
  gdriveLog("🔄 Sincronizando...");
  // Download remote, compare timestamps, merge or push
  return gapi.client.drive.files.get({fileId:gdState.fileId,alt:"media"}).then(function(r){
    var remote;try{remote=typeof r.result==="string"?JSON.parse(r.result):r.result}catch(e){remote=null}
    var localTime=D._lastModified||0;
    var remoteTime=remote&&remote.updatedAt?new Date(remote.updatedAt).getTime():0;
    if(remoteTime>localTime+2000){
      // Remote is newer: pull
      D=remote.data;D._lastModified=remoteTime;
      localStorage.setItem("mll_data",JSON.stringify(D));
      render();
      gdriveLog("⬇️ Datos descargados de Drive "+new Date().toLocaleTimeString("es-CL"));
    }else if(localTime>remoteTime){
      // Local is newer: push
      return gdriveUpload();
    }else{
      gdriveLog("✅ Sincronizado "+new Date().toLocaleTimeString("es-CL"));
    }
    gdState.syncing=false;gdState.lastSync=Date.now();
  }).catch(function(e){gdriveLog("❌ "+e.message);gdState.syncing=false});
}

function gdriveUpload(){
  var payload={data:D,version:APP_VERSION,updatedAt:new Date().toISOString()};
  return gapi.client.request({path:"/upload/drive/v3/files/"+gdState.fileId,method:"PATCH",params:{uploadType:"media"},body:JSON.stringify(payload)}).then(function(){
    gdriveLog("⬆️ Subido "+new Date().toLocaleTimeString("es-CL"));
    gdState.syncing=false;gdState.lastSync=Date.now();
  });
}

// Patch save() to mark modification and trigger sync
var _originalSave=save;
save=function(){
  try{D._lastModified=Date.now();localStorage.setItem("mll_data",JSON.stringify(D));localStorage.setItem("mll_version",APP_VERSION)}catch(e){}
  // Debounced sync
  if(gdState.authed&&!gdState.syncing){
    clearTimeout(window._syncTimer);
    window._syncTimer=setTimeout(function(){gdriveUpload()},3000);
  }
};
